<html lang="en">
<head>
    <!-- Map Icon Reference Sheet — Webwings getroute project -->
    <!-- (c) Webwings 2025 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Icons Reference — Webwings</title>
    <style>
        /* ── Reset & base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 11px;
            background: #f4f5f7;
            color: #2c3e50;
        }

        /* ── Page header ── */
        header {
            background: #1a2a3a;
            color: #fff;
            padding: 14px 20px 10px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        header h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: .03em;
        }
        header span {
            font-size: 11px;
            color: #8fa8c0;
        }

        /* ── Search bar ── */
        #search-bar {
            background: #243447;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        #search-bar label {
            color: #8fa8c0;
            font-size: 11px;
            white-space: nowrap;
        }
        #filter {
            flex: 1;
            max-width: 340px;
            padding: 4px 8px;
            border: 1px solid #3a5068;
            border-radius: 4px;
            background: #1a2a3a;
            color: #e0eaf4;
            font-size: 11px;
            outline: none;
        }
        #filter:focus { border-color: #5b9bd5; }
        #count {
            margin-left: auto;
            color: #8fa8c0;
            font-size: 11px;
        }

        /* ── Grid wrapper ── */
        #grid {
            padding: 12px 16px;
            /* 4-column grid — fits portrait A4/letter nicely */
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        /* ── Each icon card ── */
        .icon-card {
            display: flex;
            align-items: center;
            gap: 7px;
            background: #fff;
            border: 1px solid #e2e6ea;
            border-radius: 5px;
            padding: 5px 7px;
            cursor: default;
            transition: background .12s, border-color .12s;
            overflow: hidden;
        }
        .icon-card:hover {
            background: #eaf3fb;
            border-color: #5b9bd5;
        }
        .icon-card img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            flex-shrink: 0;
            /* checkerboard background so transparent PNGs are visible */
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 8px 8px;
            background-position: 0 0, 0 4px, 4px -4px, -4px 0;
            border-radius: 2px;
        }
        .icon-card .name {
            font-size: 10px;
            color: #3a5068;
            word-break: break-all;
            line-height: 1.25;
        }
        .icon-card.hidden { display: none; }

        /* ── Icon popup overlay ── */
        #icon-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #icon-popup.visible { display: flex; }

        #icon-popup-box {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-width: 220px;
            max-width: 90vw;
        }
        #icon-popup-img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            /* checkerboard background */
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 12px 12px;
            background-position: 0 0, 0 6px, 6px -6px, -6px 0;
            border-radius: 4px;
        }
        #icon-popup-name {
            font-size: 12px;
            font-weight: 700;
            color: #1a2a3a;
            text-align: center;
        }
        #icon-popup-url {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #3a5068;
            background: #f0f4f8;
            border: 1px solid #d0dae4;
            border-radius: 4px;
            padding: 6px 8px;
            word-break: break-all;
            text-align: left;
            width: 100%;
        }
        #icon-popup-copy {
            background: #1a2a3a;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 7px 18px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s;
        }
        #icon-popup-copy:hover { background: #243447; }
        #icon-popup-copy.copied { background: #27ae60; }
        #icon-popup-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 20px;
            color: #8fa8c0;
            cursor: pointer;
            line-height: 1;
        }
        #icon-popup-close:hover { color: #1a2a3a; }
        #icon-popup-box { position: relative; }

        /* ── Print styles ── */
        @media print {
            body { background: #fff; font-size: 9px; }
            #search-bar { display: none; }
            header { background: #1a2a3a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #grid { gap: 3px; padding: 8px; }
            .icon-card { break-inside: avoid; border-color: #ccc; }
            .icon-card:hover { background: #fff; border-color: #ccc; }
        }

        /* ── Responsive: 3 columns on narrow screens ── */
        @media (max-width: 600px) {
            #grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

    /** Base URL for icon files — relative to this page's location. */
    const ICON_BASE_URL = 'mapicons/';

    /**
     * Renders all icon cards into the #grid element.
     * Each card shows the icon image and its filename (without extension).
     * Clicking a card opens the detail popup.
     */
    function renderIcons() {
        const grid = document.getElementById('grid');
        const fragment = document.createDocumentFragment();

        ICONS.forEach(filename => {
            const name = filename.replace('.png', '');

            const card = document.createElement('div');
            card.className = 'icon-card';
            card.dataset.name = name.toLowerCase();
            card.dataset.filename = filename;
            card.title = 'Click to copy URL';
            card.style.cursor = 'pointer';

            const img = document.createElement('img');
            img.src = `${ICON_BASE_URL}${filename}`;
            img.alt = name;
            img.loading = 'lazy';  // lazy-load for performance with 800+ images

            const label = document.createElement('span');
            label.className = 'name';
            label.textContent = name;

            card.addEventListener('click', () => openPopup(filename));

            card.appendChild(img);
            card.appendChild(label);
            fragment.appendChild(card);
        });

        grid.appendChild(fragment);
        updateCount();
    }

    /**
     * Opens the icon detail popup for the given filename.
     * Shows the icon at 2× size (48×48px) and the full raw GitHub URL.
     *
     * @param {string} filename - Icon filename (e.g. 'campfire.png')
     */
    function openPopup(filename) {
        const name = filename.replace('.png', '');
        const url  = `${ICON_BASE_URL}${filename}`;

        document.getElementById('icon-popup-img').src = url;
        document.getElementById('icon-popup-img').alt = name;
        document.getElementById('icon-popup-name').textContent = name;
        document.getElementById('icon-popup-url').textContent  = url;

        const copyBtn = document.getElementById('icon-popup-copy');
        copyBtn.textContent = 'Copy URL';
        copyBtn.classList.remove('copied');

        document.getElementById('icon-popup').classList.add('visible');
    }

    /**
     * Closes the icon detail popup.
     */
    function closePopup() {
        document.getElementById('icon-popup').classList.remove('visible');
    }

    /**
     * Filters visible icon cards based on the current value of the #filter input.
     * Cards whose filename does not match the query are hidden via CSS class.
     */
    function filterIcons() {
        const query = document.getElementById('filter').value.toLowerCase().trim();
        const cards = document.querySelectorAll('.icon-card');

        cards.forEach(card => {
            const match = !query || card.dataset.name.includes(query);
            card.classList.toggle('hidden', !match);
        });

        updateCount();
    }

    /**
     * Updates the visible/total icon count display in the search bar.
     */
    function updateCount() {
        const total = ICONS.length;
        const visible = document.querySelectorAll('.icon-card:not(.hidden)').length;
        const el = document.getElementById('count');
        el.textContent = visible === total
            ? `${total} icons`
            : `${visible} / ${total} icons`;
    }

    // Initialise on DOM ready
    document.addEventListener('DOMContentLoaded', () => {
        renderIcons();
        document.getElementById('filter').addEventListener('input', filterIcons);

        // Close popup on overlay click or close button
        document.getElementById('icon-popup').addEventListener('click', e => {
            if (e.target === document.getElementById('icon-popup')) closePopup();
        });
        document.getElementById('icon-popup-close').addEventListener('click', closePopup);

        // Close popup on Escape key
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closePopup();
        });

        // Copy URL to clipboard
        document.getElementById('icon-popup-copy').addEventListener('click', () => {
            const url = document.getElementById('icon-popup-url').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('icon-popup-copy');
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy URL';
                    btn.classList.remove('copied');
                }, 2000);
            });
        });
    });
</script>
